<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dreamlight Critter Schedule</title>
  <link rel="preconnect" href="https://dreamlightvalleywiki.com" />
  <meta name="theme-color" content="#202778">
  <style>
    :root {
      --bg: #141b5c;
      --bg-2: #1c2571;
      --panel: rgba(22, 30, 97, 0.92);
      --panel-2: rgba(35, 45, 128, 0.82);
      --line: rgba(196, 211, 255, 0.26);
      --line-soft: rgba(196, 211, 255, 0.14);
      --text: #fffdf7;
      --muted: #c9d4ff;
      --gold: #f6d586;
      --purple: #714fbd;
      --purple-2: #8b6be2;
      --green: #386c54;
      --danger: #ff435e;
      --card: rgba(47, 58, 139, 0.88);
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.38);
      --radius: 22px;
      --hour-height: 40px;
      --time-col: 78px;
      --critter-col: minmax(86px, 96px);
      --slot-colour: #8b6be2;
      --slot-colour-dark: #714fbd;
      --top-offset: 83px;
      font-family:
        Inter,
        ui-sans-serif,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background: #18236f;
      background:
        radial-gradient(circle at 20% 0%,
          rgba(122, 91, 214, 0.65),
          transparent 34%),
        radial-gradient(circle at 85% 20%,
          rgba(31, 137, 210, 0.28),
          transparent 30%),
        linear-gradient(180deg, #11184f 0%, #18236f 45%, #202778 100%);
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle,
          rgba(255, 255, 255, 0.78) 0 1px,
          transparent 1.4px),
        radial-gradient(circle,
          rgba(246, 213, 134, 0.72) 0 1px,
          transparent 1.4px);
      background-size:
        190px 190px,
        260px 260px;
      background-position:
        15px 25px,
        95px 70px;
      opacity: 0.22;
      z-index: 0;
    }

    body::after {
      top: auto;
      height: 180px;
      background:
        radial-gradient(ellipse at bottom,
          rgba(19, 9, 61, 0.82),
          transparent 72%),
        linear-gradient(to top, rgba(7, 11, 47, 0.85), transparent);
      opacity: 1;
    }

    button {
      font: inherit;
    }

    .app {
      position: relative;
      z-index: 1;
      width: min(1540px, 100% - 28px);
      margin: 0 auto;
      padding: 28px 0 14px;
      display: flex;
      flex-direction: column;
      height: auto;
      min-height: 100vh;
    }

    .topbar {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 28px;
      margin-bottom: 14px;
    }

    .top-actions {
      justify-self: end;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .day-nav-row {
      margin-bottom: 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 18px;
      min-width: 0;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 54px;
      height: 54px;
      border-radius: 18px;
      color: var(--gold);
      background: linear-gradient(145deg,
          rgba(255, 255, 255, 0.12),
          rgba(255, 255, 255, 0.02));
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18);
      font-size: 27px;
    }

    .eyebrow {
      margin: 0 0 2px;
      color: var(--muted);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-size: 12px;
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(32px, 4vw, 54px);
      line-height: 0.96;
      color: var(--gold);
      font-weight: 700;
      text-shadow: 0 3px 16px rgba(0, 0, 0, 0.26);
    }

    .tabs {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(106px, 1fr);
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      overflow: hidden;
      background: rgba(10, 17, 68, 0.45);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .day-tab {
      min-height: 62px;
      padding: 10px 14px;
      color: var(--text);
      background: transparent;
      border: 0;
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      cursor: pointer;
    }

    .day-tab:last-child {
      border-right: 0;
    }

    .day-tab:hover {
      background: rgba(255, 255, 255, 0.07);
    }

    .day-tab.active {
      color: #fff;
      background: linear-gradient(180deg, var(--purple-2), var(--purple));
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.22),
        0 0 22px rgba(139, 107, 226, 0.36);
    }

    .day-name {
      display: block;
    }

    .today-label {
      display: block;
      margin-top: 2px;
      color: #fff2c6;
      font-size: 12px;
    }

    .schedule-shell {
      position: relative;
      flex: 1 1 auto;
      min-height: 0;
      border: 1px solid rgba(201, 212, 255, 0.22);
      background: linear-gradient(180deg,
          rgba(24, 32, 101, 0.92),
          rgba(14, 22, 76, 0.88));
      border-radius: var(--radius);
      box-shadow:
        var(--shadow),
        inset 0 1px 0 rgba(255, 255, 255, 0.13);
      overflow: hidden;
    }

    .schedule-scroll {
      position: relative;
      height: 100%;
      min-height: 0;
      max-height: none;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 8px;
    }

    .schedule-grid {
      position: relative;
      display: grid;
      grid-template-rows: auto auto calc(var(--hour-height) * 24);
    }

    .time-spacer {
      grid-column: 1;
      grid-row: 1 / 3;
      position: sticky;
      left: 0;
      z-index: 35;
      background: rgba(13, 19, 74, 0.96);
      border-right: 1px solid var(--line);
    }

    .area-header,
    .location-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      text-align: left;
      padding: 6px 10px;
      color: var(--text);
      background: rgba(18, 26, 82, 0.96);
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .header-icon {
      flex: 0 0 auto;
      display: inline-grid;
      place-items: center;
      width: 20px;
      height: 20px;
      color: var(--gold);
      filter: drop-shadow(0 0 6px rgba(246, 213, 134, 0.25));
      line-height: 1;
    }

    .header-icon svg {
      width: 100%;
      height: 100%;
      fill: currentColor;
    }

    .header-label {
      min-width: 0;
    }

    .area-header {
      grid-row: 1;
      color: var(--gold);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 18px;
      letter-spacing: 0.01em;
      justify-content: start;
    }

    .location-header {
      grid-row: 2;
      font-size: 13px;
      line-height: 1.15;
      color: #fff;
      display: flex;
      flex-direction: column;
      gap: 0;

      & .header-label {
        text-align: center;
      }
    }

    .location-header .header-icon {
      width: 16px;
      height: 16px;
      opacity: 0.82;
    }

    .day-body {
      position: relative;
      grid-row: 3;
      min-height: calc(var(--hour-height) * 24);
      background:
        repeating-linear-gradient(to bottom,
          transparent 0,
          transparent calc(var(--hour-height) - 1px),
          var(--line-soft) calc(var(--hour-height) - 1px),
          var(--line-soft) var(--hour-height)),
        repeating-linear-gradient(to right,
          transparent 0,
          transparent calc(100% - 1px),
          rgba(255, 255, 255, 0.06) calc(100% - 1px),
          rgba(255, 255, 255, 0.06) 100%);
    }

    .time-axis {
      position: absolute;
      bottom: 8px;
      left: 0;
      z-index: 60;
      width: var(--time-col);
      min-height: calc(var(--hour-height) * 24);
      background: rgba(13, 19, 74, 0.96);
      border-right: 1px solid var(--line);
      pointer-events: none;
      will-change: transform;
    }

    .time-label {
      position: absolute;
      right: 12px;
      transform: translateY(-50%);
      color: #fff8df;
      font-size: 13px;
      white-space: nowrap;

      &:first-child {
        top: 11px !important;
      }

      &:last-child {
        top: calc(100% - 11px) !important;
      }
    }

    .column-lane {
      grid-row: 3;
      position: relative;
      min-height: calc(var(--hour-height) * 24);
      border-right: 1px solid var(--line);
    }

    .critter-slot {
      position: absolute;
      left: 4px;
      right: 4px;
      min-height: 66px;
      border-radius: 11px;
      background: linear-gradient(180deg,
          color-mix(in srgb, var(--slot-colour) 88%, rgba(0, 0, 0, 0.1) 12%),
          color-mix(in srgb, var(--slot-colour-dark) 92%, rgba(0, 0, 0, 0.1) 100%));
      border: 1px solid color-mix(in srgb, var(--slot-colour) 58%, white 42%);
      box-shadow:
        0 10px 20px rgba(0, 0, 0, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.2),
        0 0 12px color-mix(in srgb, var(--slot-colour) 32%, transparent);
      overflow: hidden;
      transition:
        background 0.25s ease,
        border-color 0.25s ease,
        box-shadow 0.25s ease;

      &.fed {
        opacity: 0.5;
      }
    }

    .critter-card {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: stretch;
      gap: 3px;
      width: 100%;
      padding: 6px 0px;
      color: #fff;
      border: 0;
      background: transparent;
      cursor: pointer;
      transform: translateY(var(--sticky-y, 0px));
      will-change: transform;
    }

    .critter-img {
      width: 52px;
      height: 43px;
      object-fit: contain;
      filter: drop-shadow(0 7px 7px rgba(0, 0, 0, 0.34));
    }

    .critter-name {
      text-transform: uppercase;
      font-size: 11px;
      line-height: 1.06;
      text-align: center;
      transition: color 0.15s ease;
      padding: 3px 5px 0 5px;
    }

    .critter-meta {
      display: flex;
      flex-direction: column;
      gap: 2px;
      align-items: center;
      color: #fffbe9;
      font-size: 9px;
      line-height: 1.08;
      text-align: center;
      width: 100%;
    }

    .critter-card:hover .critter-name {
      color: var(--gold);
    }

    .method {
      width: 100%;
      background: #ffffff80;
      color: var(--purple);
      font-style: italic;
      text-transform: uppercase;
      padding: 2px 0;
      font-size: 9px;
    }

    .current-line {
      position: absolute;
      left: var(--time-col);
      width: calc(var(--schedule-width, 100%) - var(--time-col));
      height: 2px;
      background: var(--danger);
      z-index: 55;
      box-shadow: 0 0 12px rgba(255, 67, 94, 0.7);
      pointer-events: none;
    }

    .current-line-label {
      position: absolute;
      left: 8px;
      display: inline-flex;
      align-items: center;
      height: 24px;
      transform: translateY(-11px);
      padding: 0 8px;
      border-radius: 6px;
      color: #fff;
      background: var(--danger);
      font-size: 12px;
      font-weight: 800;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.28);
      white-space: nowrap;
      will-change: transform;
    }

    .empty-state {
      padding: 80px 28px;
      text-align: center;
      color: var(--muted);
    }

    .hidden-button,
    .primary-button,
    .ghost-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 44px;
      border-radius: 14px;
      padding: 10px 18px;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: linear-gradient(180deg, var(--purple-2), var(--purple));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.2),
        0 10px 24px rgba(0, 0, 0, 0.22);
      cursor: pointer;
    }

    .ghost-button {
      background: rgba(255, 255, 255, 0.08);
      box-shadow: none;
    }

    .note {
      flex: 0 0 auto;
      margin: 0;
      color: var(--muted);
      text-align: center;
      font-size: 13px;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      top:0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(3, 8, 36, 0.62);
      backdrop-filter: blur(8px);
      z-index: 100;
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      width: min(560px, 100%);
      max-height: min(760px, calc(100vh - 40px));
      overflow: auto;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: linear-gradient(180deg,
          rgba(44, 53, 134, 0.98),
          rgba(17, 24, 83, 0.98));
      box-shadow: var(--shadow);
    }

    .modal-header {
      position: sticky;
      top: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 18px 20px;
      background: rgba(36, 45, 122, 0.96);
      border-bottom: 1px solid rgba(255, 255, 255, 0.14);
    }

    .modal-title {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--gold);
      font-size: 26px;
      line-height: 1.1;
    }

    .close-button {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      cursor: pointer;
      font-size: 22px;
      line-height: 1;
    }

    .modal-body {
      padding: 20px;
    }

    .critter-detail {
      display: grid;
      grid-template-columns: 148px 1fr;
      gap: 20px;
      align-items: start;
    }

    .detail-image-wrap {
      display: grid;
      place-items: center;
      min-height: 148px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.13);
      padding: 1em;

      & div {
        display: flex;
        flex-direction:column;
        justify-content: center;
        gap: 1em;
        width: 100%;
        text-align: center;
      }
    }

    .detail-image {
      width: 100px;
      max-width:100%;
      height: 100px;
      object-fit: contain;
      filter: drop-shadow(0 10px 12px rgba(0, 0, 0, 0.35));
    }

    .detail-list {
      display: grid;
      gap: 10px;
      color: #fff;
    }

    .detail-row {
      padding: 11px 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .detail-label {
      display: flex;
      flex-direction: column;
      margin-bottom: 2px;
      color: var(--muted);
      font-size: 12px;
      gap: 3px;
    }

    .detail-value {
      font-weight: normal;
      color: #fff;
      font-size: 12px;

      & i {
        opacity: 0.5;
        display: block;
      }
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .hidden-list {
      display: grid;
      gap: 10px;
    }

    .hidden-row {
      display: grid;
      grid-template-columns: 58px 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 10px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .hidden-row img {
      width: 58px;
      height: 48px;
      object-fit: contain;
    }

    .hidden-name {
      font-weight: 900;
    }

    .hidden-meta {
      color: var(--muted);
      font-size: 12px;
    }

    .header-icon.image-icon {
      display: inline-grid;
      place-items: center;
      overflow: hidden;
    }

    .header-icon.image-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      filter: brightness(2);
    }

    .food {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding-top: 3px;
    }

    .food-img {
      width: 16px;
      height: 16px;
      object-fit: contain;
      flex: 0 0 auto;
      filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.28));
    }

    .detail-food {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .detail-food .food-img {
      width: 28px;
      height: 28px;
    }

    .unlocked-list {
      display: grid;
      gap: 16px;
    }

    .unlocked-group {
      display: grid;
      gap: 8px;
    }

    .unlocked-group-title {
      margin: 0;
      color: var(--gold);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 20px;
    }

    .unlocked-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      cursor: pointer;
    }

    .unlocked-row input {
      width: 18px;
      height: 18px;
    }

    .weekly-schedule-list {
      display: grid;
      gap: 0.45rem;
    }

    .weekly-schedule-row {
      display: grid;
      grid-template-columns: 5.5rem minmax(5rem, 1fr) minmax(8rem, 1.4fr);
      align-items: center;
      gap: 0.75rem;
    }

    .weekly-schedule-row.today {
      background: rgba(56, 108, 84, 0.1);
      border-radius: 0.75rem;
      padding: 0.45rem 0.6rem;
    }

    .schedule-bar {
      position: relative;
      display: block;
      height: 0.65rem;
      border-radius: 999px;
      background: rgba(31, 41, 55, 0.12);
      overflow: hidden;
    }

    .schedule-bar-slot {
      position: absolute;
      top: 0;
      bottom: 0;
      border-radius: 999px;
      background: var(--slot-colour, #386c54);
    }

    @media (max-width: 900px) {
      :root {
        --hour-height: 40px;
        --time-col: 62px;
      }

      .topbar {
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .top-actions {
        justify-self: stretch;
      }

      .top-actions .hidden-button {
        flex: 1 1 180px;
      }

      .brand {
        gap: 12px;
      }

      .brand-mark {
        width: 42px;
        height: 42px;
        border-radius: 14px;
        font-size: 22px;
      }

      .eyebrow {
        font-size: 10px;
      }

      h1 {
        font-size: 31px;
      }

      .tabs {
        width: 100%;
        justify-self: stretch;
        grid-auto-columns: minmax(40px, 1fr);
        overflow-x: auto;
      }

      .day-tab {
        min-height: 54px;
        padding: 8px 10px;
      }

      .day-name {
        font-size: 13px;
      }

      .today-label {
        font-size: 10px;
      }

      .schedule-scroll {
        max-height: none;
        min-height: 560px;
      }

      .schedule-grid {
        grid-template-rows: auto auto calc(var(--hour-height) * 24);
      }

      .area-header {
        font-size: 15px;
      }

      .location-header {
        font-size: 11px;
      }

      .time-label {
        right: 7px;
        font-size: 11px;
      }

      .current-line-label {
        left: calc(var(--time-col) + 4px);
        font-size: 10px;
        padding: 0 6px;
      }

      .critter-slot {
        left: 5px;
        right: 5px;
        min-height: 66px;
      }

      .critter-img {
        width: 52px;
        height: 43px;
      }

      .critter-name {
        font-size: 11px;
      }

      .critter-meta {
        font-size: 9px;
      }

      .critter-detail {
        grid-template-columns: 1fr;
      }

      .detail-image-wrap {
        min-height: 120px;

        & div {
          display: flex;
          flex-direction:row;
          gap: 1em;
          width: 100%;
          text-align: center;
        }
      }

      .detail-image {
        width: 100px;
        height: 100px;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">✦</div>
        <div>
          <p class="eyebrow">Dreamlight Valley</p>
          <h1>Critter Schedule</h1>
        </div>
      </div>

      <div class="top-actions">
        <button class="hidden-button" id="openHiddenButton" type="button">
          ✦ Critters <span id="hiddenCount">0</span>
        </button>

        <button class="hidden-button" id="openUnlockedButton" type="button">
          ✦ Areas <span id="unlockedCount">0</span>
        </button>
      </div>
    </header>

    <section class="day-nav-row">
      <nav class="tabs" id="dayTabs" aria-label="Day tabs"></nav>
    </section>

    <section class="schedule-shell" aria-label="Critter schedule">
      <div class="schedule-scroll" id="scheduleScroll">
        <div id="scheduleGrid" class="schedule-grid"></div>
      </div>
    </section>

    <p class="note">
